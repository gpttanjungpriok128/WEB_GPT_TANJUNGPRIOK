    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (error) {
          console.error("Theme bootstrap failed", error);
        }
      })();
    </script>
    <script>
      (function () {
        try {
          var rawApiUrl = "%VITE_API_URL%";
          if (!rawApiUrl || rawApiUrl === "%VITE_API_URL%") return;

          var apiOrigin = new URL(rawApiUrl, window.location.origin).origin;
          if (!apiOrigin || apiOrigin === window.location.origin) return;

          ["preconnect", "dns-prefetch"].forEach(function (rel) {
            var existing = document.head.querySelector('link[rel="' + rel + '"][href="' + apiOrigin + '"]');
            if (existing) return;
            var link = document.createElement("link");
            link.rel = rel;
            link.href = apiOrigin;
            if (rel === "preconnect") {
              link.crossOrigin = "anonymous";
            }
            document.head.appendChild(link);
          });
        } catch (error) {
          console.error("Connection hint bootstrap failed", error);
        }
      })();
    </script>
