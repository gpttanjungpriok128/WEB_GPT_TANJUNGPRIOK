name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
        env:
          JWT_SECRET: ci-test-secret
      - name: Syntax Check
        run: find . -path './node_modules' -prune -o -name '*.js' -print | xargs -I{} node --check {}

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
