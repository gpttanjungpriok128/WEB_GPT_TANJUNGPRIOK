version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: church_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: church_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: ./server
    container_name: church_backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      NODE_ENV: production
      CLIENT_URL: http://localhost
    depends_on:
      - postgres
    ports:
      - '5000:5000'

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
        VITE_SERVER_URL: ''
    container_name: church_frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: church_gateway
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '80:80'

volumes:
  postgres_data:
